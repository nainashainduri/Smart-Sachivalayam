<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Staff login for Smart Sachivalayam Portal dashboard.">
  <title>Staff Login | Smart Sachivalayam Portal</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="login-page">
    <div class="login-container">
      <div class="login-header">
        <div class="logo-icon">🏛️</div>
        <h1>Staff Login</h1>
        <p>Smart Sachivalayam Portal — Authorized Access Only</p>
      </div>

      <form class="login-form" id="loginForm" novalidate>
        <div class="demo-credentials">
          Demo: Username <strong>admin</strong> · Password <strong>Sachivalayam@2024</strong>
        </div>

        <div id="loginError" class="error-message" style="text-align:center; margin-bottom:1rem;"></div>

        <div class="form-group">
          <label for="username">Username</label>
          <input type="text" id="username" name="username" placeholder="Enter your username" autocomplete="username">
          <span class="error-message" id="usernameError"></span>
        </div>

        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" name="password" placeholder="Enter your password" autocomplete="current-password">
          <span class="error-message" id="passwordError"></span>
        </div>

        <button type="submit" class="btn btn-primary">Sign In</button>
      </form>

      <div class="login-footer">
        <a href="index.html">← Back to Home</a>
      </div>
    </div>
  </div>

  <script src="js/login.js"></script>
</body>
</html>
